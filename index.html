<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/styles.css">
        <title>Student Grade Manager</title>
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <li><a href="#Promedio">Promedio</a></li>
                    <li><a href="#Convertir Unidades">Convertir Unidades</a></li>
                    <li><a href="#Mis Notas">Mis Notas</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <br><br><br><br>
            <h1 class="titulo-centrado">¡Calcula tu Promedio!</h1>
            <h2 class="titulo-izquierda">Agrega tus Materias:</h2>
            <div class="contenedor-boton-agregar">
                <button id="btn-agregar">Agregar Materia</button>
            </div>
            <div class="contenedor-tabla">
                <table id="tabla-materias">
                    <thead>
                        <tr>
                        <th>Materia:</th>
                        <th>Nota:</th>
                        <th>Creditos:</th>
                        </tr>
                    </thead>
                    <tbody>
                        
                    </tbody>
                </table>
            </div>
            <div class="contenedor-boton">
                <button id="btn-calcular">Calcular Promedio</button>
            </div>
            <div class="contenedor-resultado">
                 <h2 id="texto-resultado">Tu promedio es: --</h2>
            </div>
        </main>
        <footer>
            <div class="footer-contenido">
                <p>&copy; 2026 Calculadora de Promedios. Creado por Julian M.A.</p>
                <ul class="footer-links">
                    <li><a href="mailto:julian.moreno@utp.edu.co" target="_blank">Contacto</a></li>
                    <li><a href="https://github.com/SRSURY" target="_blank">GitHub</a></li>
                    <li><a href="https://github.com/SRSURY/Student-Grade-Web" target="_blank">Código fuente</a></li>
                    
                </ul>
            </div>
        </footer>
        <script src="js/main.js"></script>
    </body>
</html>
